# APPLICATION CONFIGURATION

app.name=Urban Ladder Automation
url=https://www.urbanladder.com/

# BROWSER CONFIGURATION

browser=chrome
headless=false
maximize=true

# TIMEOUTS (SECONDS)

implicitWait=10
explicitWait=20
pageLoadTimeout=30
scriptTimeout=20

# TEST DATA FILES

excel.input.path=./src/test/resources/testdata/testdata.xlsx
excel.output.path=./src/test/resources/testData/TestOutput.xlsx

# REPORTS

extent.report.path=./reports/ExtentReport.html
report.screenshots=true

# SCREENSHOTS

screenshot.path=./screenshots/
capture.on.pass=false
capture.on.fail=true

# TEST USER DATA

giftcard.sheet=giftcardinput
bookshelf.sheet=Bookshelves
terra.sheet=Terra Collection
deliveryDate = July 20, 2026


